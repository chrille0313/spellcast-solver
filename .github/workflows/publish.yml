name: Publish to PyPI

# Publishes via PyPI Trusted Publishing (OIDC) when a GitHub release is
# published. No API tokens are stored; configure the repo as a trusted
# publisher on PyPI first (see README).
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
